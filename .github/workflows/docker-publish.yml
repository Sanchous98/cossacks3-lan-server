name: Publish Docker image

# Build and publish the container image whenever a version tag is pushed, e.g. v1.2.3
on:
  push:
    tags:
      # semver-shaped tags only (vN.N.N, optional -prerelease/+build); a non-version
      # 'v*' tag would trigger a build that then fails with no image tags to push
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR with the built-in GITHUB_TOKEN

    steps:
      - name: Check out the repository (with the asio submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # the Dockerfile copies asio/include from the context

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so the mixed-case owner is fine
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          # latest=auto (default) also tags :latest for non-prerelease version tags

      - name: Build and push the image
        uses: docker/build-push-action@v6
        with:
          context: .
          # add linux/arm64 for multi-arch (also add docker/setup-qemu-action above; slower)
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
